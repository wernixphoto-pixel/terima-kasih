<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terima Kasih Sudah Menonton</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

/* Fullscreen */
.container{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* Gambar Closing */
.closing{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;

    opacity:0;
    transform:scale(1);

    /* Fade In + Zoom */
    animation: closingAnimation 25s ease-in-out forwards;
}

/* Animasi */
@keyframes closingAnimation{

    /* Awal */
    0%{
        opacity:0;
        transform:scale(1);
    }

    /* Fade In */
    8%{
        opacity:1;
        transform:scale(1.01);
    }

    /* Stabil */
    20%{
        opacity:1;
        transform:scale(1.02);
    }

    /* Zoom Perlahan */
    40%{
        opacity:1;
        transform:scale(1.04);
    }

    60%{
        opacity:1;
        transform:scale(1.06);
    }

    80%{
        opacity:1;
        transform:scale(1.08);
    }

    /* Akhir - Tetap Tampil */
    100%{
        opacity:1;
        transform:scale(1.10);
    }
}

</style>
</head>

<body>

<div class="container">

    <img
        class="closing"
        src="terima kasih sudah menonton.png"
        alt="Terima Kasih Sudah Menonton">

</div>

</body>
</html>
